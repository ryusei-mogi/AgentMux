name: Bug Report
description: Report broken or unsafe behavior.
title: '[Bug]: '
labels:
  - 'type: bug'
  - 'status: needs-triage'
body:
  - type: markdown
    attributes:
      value: |
        Please do not include provider API keys, bearer tokens, private prompts, or local database contents.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps or config shape using placeholders only.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: agentmux --version
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      multiple: true
      options:
        - npm/global install
        - local development
        - Docker
        - Homebrew
        - other
  - type: textarea
    id: logs
    attributes:
      label: Sanitized Logs
      description: Paste only logs with secrets and prompts removed.
      render: text
