name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        if: ${{ matrix.node-version != 22 }}
        run: npm test

      - name: Test with publishable reports
        if: ${{ matrix.node-version == 22 }}
        run: npm run test:report

      - name: Upload test and coverage reports
        if: ${{ always() && matrix.node-version == 22 }}
        uses: actions/upload-artifact@v7
        with:
          name: test-and-coverage-reports-node-22
          path: |
            coverage/
            test-results/
          if-no-files-found: error

      - name: Build
        run: npm run build

      - name: OSS safety check
        run: npm run check:oss-safety

      - name: Package dry run
        run: npm pack --dry-run

  test-required:
    name: test
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() }}
    steps:
      - name: Confirm matrix test jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Matrix test jobs finished with ${{ needs.test.result }}"
            exit 1
          fi
